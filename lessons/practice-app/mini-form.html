<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Form (iframe)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="home-hero" style="margin-bottom:2.5rem;">
    <h1 style="font-size:1.5rem; margin-bottom:0.5rem;">Mini Form (Inside iframe)</h1>
    <div class="home-meta" style="margin-bottom:1.2rem;">
      <span class="home-pill" style="background:var(--accent-soft);color:var(--accent);margin-right:0.7em;">Practice Lab</span>
      <span class="home-pill" style="background:var(--warm);color:#fff;">Iframe</span>
    </div>
    <p style="font-size:1.05rem;max-width:400px;">Practice iframe field handling and form automation. Use this form to master Playwright's frame selectors and input actions.</p>
  </section>

  <section class="home-card" style="margin-bottom:2.5rem;">
    <h2 style="margin-top:0;">Mini Form</h2>
    <form>
      <label for="mini-text">Text:</label>
      <input type="text" id="mini-text" name="mini-text"><br><br>
      <label for="mini-check">Check me:</label>
      <input type="checkbox" id="mini-check" name="mini-check"><br><br>
      <button type="submit">Submit</button>
    </form>
  </section>

  <a href="../../index.html" class="home-btn floating-home-btn" title="Back to Home">&#8962; Home</a>
  <script src="../../assets/app.js"></script>
</body>
</html>
